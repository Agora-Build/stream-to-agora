name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# One release at a time so npm dist-tags.latest doesn't get clobbered
# by a parallel release if two tags push close together.
concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64
          # The Agora RTSA SDK only ships for x86_64-linux-gnu, so that's
          # the only target we can build today. Re-enable the others once
          # Agora publishes matching SDK tarballs:
          # TODO(arm64-linux):  Agora-RTC-aarch64-linux-gnu-* URL (currently 404)
          # TODO(macos):        no macOS RTSA build exists at download.agora.io
          # - os: ubuntu-latest
          #   target: aarch64-unknown-linux-gnu
          #   artifact: linux-aarch64
          # - os: macos-14
          #   target: aarch64-apple-darwin
          #   artifact: darwin-aarch64
          # - os: macos-14
          #   target: x86_64-apple-darwin
          #   artifact: darwin-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install CMake (already on runners but ensure presence)
        shell: bash
        run: cmake --version

      - name: Install ffmpeg + ffprobe (needed by the integration tests)
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update -qq && sudo apt-get install -y ffmpeg
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install ffmpeg
          fi
          ffmpeg -version | head -1
          ffprobe -version | head -1

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          perl -pi -e "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        shell: bash
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package binary + SDK libs
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          ARTIFACT="${{ matrix.artifact }}"
          BINARY="target/${TARGET}/release/stream-to-agora"

          # Find the CMake build output (under target/.../build/stream-to-agora-*/out/build)
          # and read the SDK lib path written by CMake.
          PATHS_FILE="$(find "target/${TARGET}/release/build" -type f -name "agora_sdk_paths.txt" | head -1)"
          [[ -n "$PATHS_FILE" ]] || { echo "agora_sdk_paths.txt not found"; exit 1; }
          SDK_LIB_DIR="$(grep '^AGORA_RTC_LIB_DIR=' "$PATHS_FILE" | cut -d= -f2-)"
          [[ -d "$SDK_LIB_DIR" ]] || { echo "SDK lib dir missing: $SDK_LIB_DIR"; exit 1; }

          # Strip binary
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            strip "$BINARY" 2>/dev/null || true
          else
            strip -x "$BINARY" 2>/dev/null || true
          fi

          # Stage tarball layout: stream-to-agora/{bin,lib}/...
          STAGE="dist-stage/stream-to-agora"
          rm -rf dist-stage
          mkdir -p "$STAGE/bin" "$STAGE/lib"
          cp "$BINARY" "$STAGE/bin/stream-to-agora"

          # Copy every SDK shared lib (libagora_rtc_sdk + dependencies like libaosl, libagora-fdkaac).
          # macOS uses .dylib, Linux uses .so.
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            cp -a "$SDK_LIB_DIR"/*.dylib "$STAGE/lib/" 2>/dev/null || true
          else
            cp -a "$SDK_LIB_DIR"/*.so* "$STAGE/lib/" 2>/dev/null || true
          fi

          ARCHIVE="stream-to-agora-${VERSION}-${ARTIFACT}.tar.gz"
          tar -czf "$ARCHIVE" -C dist-stage stream-to-agora
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/stream-to-agora-*

  npm-publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cd npm
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing @agora-build/stream-to-agora@${VERSION}"

      - name: Publish to npm
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  r2-mirror:
    name: Mirror to Cloudflare R2
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Upload binaries + install script to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          npm i -g wrangler
          VERSION="${GITHUB_REF_NAME}"
          # Shared releases bucket for all Agora-Build CLIs. dl.agora.build
          # is the custom domain attached to it; per-project key prefix
          # keeps atem/ and stream-to-agora/ separate.
          BUCKET="agora-build-releases"

          # Mirror tarballs under stream-to-agora/releases/<version>/
          for f in dist/stream-to-agora-*.tar.gz; do
            KEY="stream-to-agora/releases/${VERSION}/$(basename $f)"
            echo "Uploading $KEY"
            wrangler r2 object put "$BUCKET/$KEY" --file="$f" --remote
          done

          # 'latest' marker (plain text, no 'v' prefix)
          echo -n "${VERSION#v}" | wrangler r2 object put "$BUCKET/stream-to-agora/releases/latest" \
            --pipe --content-type text/plain --remote

          # Install script
          wrangler r2 object put "$BUCKET/stream-to-agora/install.sh" \
            --file=scripts/install.sh --content-type text/plain --remote
